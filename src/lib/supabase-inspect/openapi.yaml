openapi: 3.0.3

info:
  title: Supabase Inspect Tool
  description: Read-only inspection tool for Supabase used by OpenAI Agents.
  version: 1.0.0

servers:
  - url: https://lp-factory-10.vercel.app
    description: LP Factory production API

paths:
  /api/agent-tools/supabase-inspect:
    post:
      operationId: runSupabaseInspect
      summary: Run read-only inspection queries against Supabase
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                briefing:
                  type: string
                  description: Inspection request from the agent
      responses:
        '200':
          description: Successful inspection response
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: string
                    description: Inspection result
