name: Automation Validador Final

on:
  workflow_dispatch:
    inputs:
      app_url:
        description: "URL manual do app para o fluxo determinístico"
        required: true
        default: ""

permissions:
  contents: read

concurrency:
  group: automation-validador-final-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: automations/validador-final

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore state cache
        id: restore-state
        uses: actions/cache/restore@v4
        with:
          path: automations/validador-final/state/test-account.json
          key: automation-validador-final-state-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            automation-validador-final-state-${{ github.ref_name }}-

      - name: Ensure default state
        working-directory: .
        run: |
          if [ ! -f automations/validador-final/state/test-account.json ]; then
            mkdir -p automations/validador-final/state
            cat <<'JSON' > automations/validador-final/state/test-account.json
            {
              "email": "",
              "password": "",
              "status": "empty",
              "sequence": 30,
              "last_updated_at": null
            }
            JSON
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install deps (isolated subproject)
        run: npm ci

      - name: Check automation subproject
        run: npm run check

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run validador final
        env:
          APP_URL_OVERRIDE: ${{ inputs.app_url }}
          MAILBOX_EMAIL: ${{ secrets.MAILBOX_EMAIL }}
          MAILBOX_PASSWORD: ${{ secrets.MAILBOX_PASSWORD }}
        run: npm run start

      - name: Save state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: automations/validador-final/state/test-account.json
          key: automation-validador-final-state-${{ github.ref_name }}-${{ github.run_id }}
