name: Automation Validador Final

on:
  workflow_dispatch:
    inputs:
      briefing_path:
        description: "Path do briefing JSON do MVP 1"
        required: false
        default: "automations/validador-final/templates/briefings/mvp1-login.json"
      app_url:
        description: "URL manual do app para o teste de login da fase 1"
        required: true
        default: ""
      login_email:
        description: "E-mail manual da conta de teste para a fase 1"
        required: true
        default: ""
      login_password:
        description: "Senha manual da conta de teste para a fase 1"
        required: true
        default: ""

permissions:
  contents: read

concurrency:
  group: automation-validador-final-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: automations/validador-final

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install deps (isolated subproject)
        run: npm ci

      - name: Check automation subproject
        run: npm run check

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run validador final
        env:
          BRIEFING_PATH: ${{ github.workspace }}/${{ inputs.briefing_path }}
          APP_URL_OVERRIDE: ${{ inputs.app_url }}
          LOGIN_EMAIL_OVERRIDE: ${{ inputs.login_email }}
          LOGIN_PASSWORD_OVERRIDE: ${{ inputs.login_password }}
        run: npm run start
