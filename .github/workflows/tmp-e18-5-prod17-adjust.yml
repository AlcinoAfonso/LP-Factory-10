name: Temporary E18.5 prod17 adjustment

on:
  push:
    branches:
      - agent/e18-5-roadmap-subsections

permissions:
  contents: write

jobs:
  adjust-docs:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/e18-5-roadmap-subsections
          fetch-depth: 0

      - name: Register prod17 in E18.5
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('docs/roadmap.md')
          text = path.read_text(encoding='utf-8')

          old_updates = (
              '- Updates:\n'
              '  - Aplicados: N/A.\n\n'
              '18.5.3 Módulos e funções estruturais'
          )
          new_updates = (
              '- Updates:\n'
              '  - Aplicados: `prod#17` — WCAG 2.2 como baseline de acessibilidade, incorporado exclusivamente ao contrato abstrato de `faq.accordion@v1` para operação por teclado, exposição do estado expandido ou recolhido, associação acessível e preservação de foco.\n\n'
              '18.5.3 Módulos e funções estruturais'
          )
          if old_updates not in text:
              raise SystemExit('Expected E18.5 update block not found')
          text = text.replace(old_updates, new_updates, 1)

          old_changelog = (
              'v1.5.96 — 21/07/2026 — E18.5 reorganizada conforme `docs/template-roadmap.md`: '
              'registros de implementação movidos para 18.5.2 sem artefatos `docs/**`, conteúdos implementados '
              'distribuídos entre 18.5.3 e 18.5.9 e status atualizado após aprovação e merge do PR #590.'
          )
          new_changelog = (
              'v1.5.96 — 21/07/2026 — E18.5 reorganizada conforme `docs/template-roadmap.md`: '
              'registros de implementação movidos para 18.5.2 sem artefatos `docs/**`, `prod#17` registrado como '
              'update aplicado ao contrato abstrato de `faq.accordion@v1`, conteúdos implementados distribuídos entre '
              '18.5.3 e 18.5.9 e status atualizado após aprovação e merge do PR #590.'
          )
          if old_changelog not in text:
              raise SystemExit('Expected roadmap changelog entry not found')
          text = text.replace(old_changelog, new_changelog, 1)

          path.write_text(text, encoding='utf-8')
          Path('.github/workflows/tmp-e18-5-prod17-adjust.yml').unlink()
          PY

      - name: Commit final documentary adjustment
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/roadmap.md .github/workflows/tmp-e18-5-prod17-adjust.yml
          git commit -m "docs: registra prod#17 na E18.5"
          git push origin HEAD:agent/e18-5-roadmap-subsections
